apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: droneflow
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: droneflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s # how often to poll every target
    scrape_configs:
      - job_name: "order-service" # arbitrary label for this group of targets
        static_configs:
          - targets: ["order-service:8080"] # K8s Service DNS name + port
      - job_name: "drone-service"
        static_configs:
          - targets: ["drone-service:8082"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: droneflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
